<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark"><a class="navbar-brand" href="/">Back to Home</a></nav>
<div class="container mt-5">
    <h2>Admin & Manager Dashboard</h2>
    <p>Manage all tours below.</p>

    <table class="table table-hover mt-4">
        <thead class="thead-dark"><tr><th>Title</th><th>Price</th><th>Type</th><th>Status</th><th>Is Hot?</th><th>Action</th></tr></thead>
        <tbody>
        <tr th:each="v : ${vouchers}">
            <td th:text="${v.title}"></td>
            <td th:text="${v.price}"></td>
            <td th:text="${v.tourType}"></td>
            <td th:text="${v.status}"></td>
            <td th:text="${v.isHot}"></td>
            <td>
                <button class="btn btn-sm btn-danger" th:onclick="'deleteTour(\'' + ${v.id} + '\')'">Delete</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="container mt-5">
    <h2>Admin Dashboard</h2>

    <div class="card p-3 mb-5" sec:authorize="hasRole('ADMIN')">
        <h4>Create New Tour</h4>
        <form action="/web/vouchers/create" method="post" class="form-inline">
            <input type="text" name="title" class="form-control mr-2" placeholder="Title" required>
            <input type="number" step="0.01" name="price" class="form-control mr-2" placeholder="Price" required>
            <select name="tourType" class="form-control mr-2">
                <option value="REST">Rest</option>
                <option value="EXCURSION">Excursion</option>
                <option value="SHOPPING">Shopping</option>
            </select>
            <button type="submit" class="btn btn-primary">Add Tour</button>
        </form>
    </div>

    <h4 sec:authorize="hasRole('ADMIN')">Manage Users</h4>
    <table class="table table-sm mb-5" sec:authorize="hasRole('ADMIN')">
        <tr><th>Username</th><th>Email</th><th>Status</th><th>Action</th></tr>
        <tr th:each="u : ${users}">
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.active ? 'Active' : 'Blocked'}"></td>
            <td>
                <form th:action="@{'/web/users/' + ${u.username} + '/block'}" method="post">
                    <button type="submit" class="btn btn-sm" th:classappend="${u.active ? 'btn-danger' : 'btn-success'}"
                            th:text="${u.active ? 'Block' : 'Unblock'}"></button>
                </form>
            </td>
        </tr>
    </table>
</div>

<script>
    function deleteTour(id) {
        if(confirm("Are you sure?")) {
            fetch('/api/vouchers/' + id, { method: 'DELETE' })
            .then(res => {
                if(res.ok) window.location.reload();
                else alert("Error deleting tour");
            });
        }
    }
</script>
</body>
</html>
