<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Set New Password</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">

    <div class="mb-3 text-right">
        <a th:href="@{/auth/reset-password(token=${resetDTO.token}, lang='en')}" class="btn btn-sm btn-outline-secondary">EN</a>
        <a th:href="@{/auth/reset-password(token=${resetDTO.token}, lang='uk')}" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2>Set New Password</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid or expired password reset token. Please request a new one.
    </div>

    <form th:action="@{/auth/reset-password}" th:object="${resetDTO}" method="post">

        <input type="hidden" th:field="*{token}" />

        <div class="form-group">
            <label>New Password</label>
            <input type="password" th:field="*{password}" id="passwordInput" class="form-control">

            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                Weak password error message
            </div>

            <div class="progress mt-2" style="height: 5px;">
                <div id="passwordStrengthBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
            </div>
            <small id="passwordHelp" class="form-text text-muted mt-1"></small>
        </div>

        <button type="submit" class="btn btn-success btn-block">Save New Password</button>
    </form>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const passwordInput = document.getElementById('passwordInput');
        const strengthBar = document.getElementById('passwordStrengthBar');
        const helpText = document.getElementById('passwordHelp');
        const msgWeak = /*[[#{password.weak}]]*/ 'Слабкий пароль';
        const msgMedium = /*[[#{password.medium}]]*/ 'Середній пароль';
        const msgGood = /*[[#{password.good}]]*/ 'Хороший пароль';
        const msgStrong = /*[[#{password.strong}]]*/ 'Надійний пароль';
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.match(/[A-Z]/)) strength += 25;
            if (password.match(/[0-9]/)) strength += 25;
            if (password.match(/[^a-zA-Z0-9]/)) strength += 25;
            strengthBar.className = 'progress-bar';
            helpText.className = 'form-text mt-1';
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                helpText.innerText = '';
            } else if (strength <= 25) {
                strengthBar.style.width = '25%';
                strengthBar.classList.add('bg-danger');
                helpText.innerText = msgWeak;
                helpText.classList.add('text-danger');
            } else if (strength === 50) {
                strengthBar.style.width = '50%';
                strengthBar.classList.add('bg-warning');
                helpText.innerText = msgMedium;
                helpText.classList.add('text-warning');
            } else if (strength === 75) {
                strengthBar.style.width = '75%';
                strengthBar.classList.add('bg-info');
                helpText.innerText = msgGood;
                helpText.classList.add('text-info');
            } else if (strength === 100) {
                strengthBar.style.width = '100%';
                strengthBar.classList.add('bg-success');
                helpText.innerText = msgStrong;
                helpText.classList.add('text-success');
            }
        });
    });
</script>
</body>
</html>
