<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.signin}">Sign In</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">

    <div class="mb-3 text-right">
        <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        <a href="?lang=uk" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2 th:text="#{nav.signin}">Sign In</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        <span th:if="${!#strings.isEmpty(param.error[0])}" th:text="#{${param.error[0]}}"></span>
        <span th:if="${#strings.isEmpty(param.error[0])}" th:text="#{login.error}"></span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success" th:text="#{login.registered}">
        Registration successful! Please log in.
    </div>
    <div th:if="${param.resetSuccess}" class="alert alert-success" th:text="#{login.reset.success}">
        Password has been successfully reset! You can now log in.
    </div>

    <form action="/auth/web-login" method="post">
        <div class="form-group">
            <label th:text="#{login.username}">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label th:text="#{login.password}">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" th:text="#{login.submit}">Login</button>

        <div class="mt-3 text-center">
            <a href="/auth/forgot-password" class="text-danger" th:text="#{login.forgot.password}">Forgot password?</a>
        </div>

        <div class="mt-3 text-center">
            <a href="/auth/sign-up" th:text="#{login.signup.prompt}">Don't have an account? Sign up!</a>
        </div>
        <div class="mt-2 text-center">
            <a href="/" class="text-secondary" th:text="#{nav.home}">Back to Home</a>
        </div>
    </form>
</div>
</body>
</html>
