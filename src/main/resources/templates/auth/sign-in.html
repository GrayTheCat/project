<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2>Sign In</h2>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password!</div>
    <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please log in.</div>
    <form action="/auth/web-login" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
        <div class="mt-3 text-center"><a href="/auth/sign-up">Don't have an account? Sign up!</a></div>
    </form>
</div>
</body>
</html>
