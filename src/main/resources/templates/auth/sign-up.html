<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.signup}">Sign Up</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">

    <div class="mb-3 text-right">
        <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        <a href="?lang=uk" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2 th:text="#{nav.signup}">Register</h2>

    <form th:action="@{/auth/web-register}" th:object="${userDTO}" method="post">

        <div class="form-group">
            <label th:text="#{signup.firstName}">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.lastName}">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.email}">Email</label>
            <input type="email" th:field="*{email}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.username}">Username</label>
            <input type="text" th:field="*{username}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.password}">Password</label>
            <input type="password" th:field="*{password}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </div>

        <button type="submit" class="btn btn-success btn-block" th:text="#{signup.submit}">Register</button>

        <div class="mt-3 text-center">
            <a href="/auth/sign-in" th:text="#{signup.signin.prompt}">Already have an account? Sign in!</a>
        </div>
        <div class="mt-2 text-center">
            <a href="/" class="text-secondary" th:text="#{nav.home}">Back to Home</a>
        </div>
    </form>
</div>
</body>
</html>
