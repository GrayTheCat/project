<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.signup}">Sign Up</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">

    <h2 th:text="#{nav.signup}">Register</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="#{${errorMessage}}">Помилка користувача</span>
    </div>

    <form th:action="@{/auth/web-register}" th:object="${userDTO}" method="post">

        <div class="mb-3 text-right">
            <button type="submit" th:formaction="@{/auth/web-register(lang='en')}" class="btn btn-sm btn-outline-secondary">EN</button>
            <button type="submit" th:formaction="@{/auth/web-register(lang='uk')}" class="btn btn-sm btn-outline-secondary">UK</button>
        </div>

        <div class="form-group">
            <label th:text="#{signup.firstName}">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.lastName}">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.email}">Email</label>
            <input type="email" th:field="*{email}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{signup.username}">Username</label>
            <input type="text" th:field="*{username}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
        </div>

        <div class="form-group">
            <label th:text="#{login.password}">Password</label>
            <input type="password" th:field="*{password}" id="passwordInput" class="form-control">
            <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                Weak password error message
            </div>
            <div class="progress mt-2" style="height: 5px;">
                <div id="passwordStrengthBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
            </div>
            <small id="passwordHelp" class="form-text text-muted mt-1"></small>
        </div>

        <button type="submit" class="btn btn-success btn-block" th:text="#{signup.submit}">Register</button>

        <div class="mt-3 text-center">
            <a href="/auth/sign-in" th:text="#{signup.signin.prompt}">Already have an account? Sign in!</a>
        </div>
        <div class="mt-2 text-center">
            <a href="/" class="text-secondary" th:text="#{nav.home}">Back to Home</a>
        </div>
    </form>
</div>
</body>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const passwordInput = document.getElementById('passwordInput');
        const strengthBar = document.getElementById('passwordStrengthBar');
        const helpText = document.getElementById('passwordHelp');
        const msgWeak = /*[[#{password.weak}]]*/ 'Слабкий пароль';
        const msgMedium = /*[[#{password.medium}]]*/ 'Середній пароль';
        const msgGood = /*[[#{password.good}]]*/ 'Хороший пароль';
        const msgStrong = /*[[#{password.strong}]]*/ 'Надійний пароль';
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.match(/[A-Z]/)) strength += 25;
            if (password.match(/[0-9]/)) strength += 25;
            if (password.match(/[^a-zA-Z0-9]/)) strength += 25;
            strengthBar.className = 'progress-bar';
            helpText.className = 'form-text mt-1';
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                helpText.innerText = '';
            } else if (strength <= 25) {
                strengthBar.style.width = '25%';
                strengthBar.classList.add('bg-danger');
                helpText.innerText = msgWeak;
                helpText.classList.add('text-danger');
            } else if (strength === 50) {
                strengthBar.style.width = '50%';
                strengthBar.classList.add('bg-warning');
                helpText.innerText = msgMedium;
                helpText.classList.add('text-warning');
            } else if (strength === 75) {
                strengthBar.style.width = '75%';
                strengthBar.classList.add('bg-info');
                helpText.innerText = msgGood;
                helpText.classList.add('text-info');
            } else if (strength === 100) {
                strengthBar.style.width = '100%';
                strengthBar.classList.add('bg-success');
                helpText.innerText = msgStrong;
                helpText.classList.add('text-success');
            }
        });
    });
</script>
</html>
