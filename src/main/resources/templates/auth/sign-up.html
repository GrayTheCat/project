<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h2>Register Personal Account</h2>
    <form action="/auth/web-register" method="post">
        <div class="form-group"><label>First Name</label><input type="text" name="firstName" class="form-control" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="lastName" class="form-control" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" required></div>
        <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="Min 6 chars, 1 uppercase, 1 digit" required></div>
        <button type="submit" class="btn btn-success btn-block">Register</button>
    </form>
</div>
</body>
</html>
