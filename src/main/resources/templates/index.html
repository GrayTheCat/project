<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Agency</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="/">Travel Agency</a>
    <div class="ml-auto">
        <a sec:authorize="isAnonymous()" href="/auth/sign-in" class="btn btn-outline-light">Sign in</a>
        <a sec:authorize="isAnonymous()" href="/auth/sign-up" class="btn btn-primary">Sign up</a>

        <a sec:authorize="isAuthenticated()" href="/profile" class="btn btn-success">My Profile</a>
        <a sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" href="/admin" class="btn btn-warning">Admin Panel</a>
        <a sec:authorize="isAuthenticated()" href="/auth/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-3 text-right">
        <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        <a href="?lang=uk" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2 th:text="#{catalog.title}">Available Tours</h2>

    <form action="/" method="get" class="card p-3 mb-4 bg-light form-row" sec:authorize="isAuthenticated()">
        <div class="col">
            <input type="number" name="maxPrice" class="form-control" placeholder="Max Price">
        </div>
        <div class="col">
            <select name="type" class="form-control">
                <option value="">Any Type</option>
                <option value="REST">Rest</option>
                <option value="EXCURSION">Excursion</option>
            </select>
        </div>
        <div class="col">
            <button type="submit" class="btn btn-primary btn-block" th:text="#{filter.btn}">Filter</button>
        </div>
    </form>

    <div class="row mt-4">
    </div>
</div>

<div class="container mt-5">
    <h2>Available Tours</h2>
    <div class="row mt-4">
        <div class="col-md-4" th:each="voucher : ${vouchers}">
            <div class="card mb-4 shadow-sm" th:classappend="${voucher.isHot} ? 'border-danger' : ''">
                <div class="card-header" th:classappend="${voucher.isHot} ? 'bg-danger text-white' : ''">
                    <h5 class="my-0 font-weight-normal" th:text="${voucher.title}">Title</h5>
                </div>
                <div class="card-body">
                    <h3 class="card-title pricing-card-title">$<span th:text="${voucher.price}"></span></h3>
                    <ul class="list-unstyled mt-3 mb-4">
                        <li><strong>Type:</strong> <span th:text="${voucher.tourType}"></span></li>
                        <li><strong>Hotel:</strong> <span th:text="${voucher.hotelType}"></span></li>
                        <li><strong>Status:</strong> <span class="badge badge-info" th:text="${voucher.status}"></span></li>
                    </ul>
                    <form th:action="@{'/web/vouchers/' + ${voucher.id} + '/order'}" method="post"
                          th:if="${voucher.status == 'REGISTERED'}"
                          sec:authorize="isAuthenticated()">
                        <button type="submit" class="btn btn-lg btn-block btn-outline-primary">Order Tour</button>
                    </form>

                    <a sec:authorize="isAnonymous()" href="/auth/sign-in" class="btn btn-lg btn-block btn-outline-secondary">Login to Order</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
