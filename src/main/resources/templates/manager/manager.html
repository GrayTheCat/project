<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.manager}">Manager Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-info">
    <a class="navbar-brand" href="/" th:text="#{nav.home}">Travel Agency</a>
    <div class="ml-auto">
        <a sec:authorize="isAuthenticated()" href="/profile" class="btn btn-success" th:text="#{nav.profile}">My Profile</a>
        <a sec:authorize="hasRole('MANAGER')" href="/manager" class="btn btn-dark" th:text="#{nav.manager}">Manager Panel</a>
        <a sec:authorize="isAuthenticated()" href="/auth/logout" class="btn btn-danger" th:text="#{nav.logout}">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="mb-3 text-right">
        <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        <a href="?lang=uk" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2 class="mb-4" th:text="#{manager.title}">Manager Dashboard</h2>

    <!-- Вкладки навігації -->
    <ul class="nav nav-tabs" id="managerTabs" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" id="orders-tab" data-toggle="tab" href="#orders" role="tab" th:text="#{manager.tab.orders}">User Orders</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="tours-tab" data-toggle="tab" href="#tours" role="tab" th:text="#{manager.tab.hot}">Manage Hot Tours</a>
        </li>
    </ul>

    <div class="tab-content bg-white border border-top-0 p-4 mb-5" id="managerTabsContent">

        <!-- ВКЛАДКА 1: ЗАМОВЛЕННЯ (Зміна статусу та Коментар) -->
        <div class="tab-pane fade show active" id="orders" role="tabpanel">
            <table class="table table-hover shadow-sm mt-3">
                <thead class="thead-light">
                <tr>
                    <th th:text="#{tour.title}">Tour</th>
                    <th th:text="#{manager.client}">Client</th>
                    <th th:text="#{tour.price}">Price</th>
                    <th th:text="#{manager.status.action}">Update Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${orderedVouchers}">
                    <td th:text="${v.title}"></td>
                    <!-- Безпечно виводимо email клієнта, якщо він існує -->
                    <td class="font-weight-bold text-primary" th:text="${v.user != null ? v.user.email : 'Unknown'}"></td>
                    <td>$<span th:text="${v.price}"></span></td>

                    <td>
                        <form th:action="@{'/web/vouchers/' + ${v.id} + '/status'}" method="post" class="form-inline">
                            <select name="status" class="form-control form-control-sm mr-2" th:classappend="${v.status == 'REGISTERED' ? 'text-info' : (v.status == 'PAID' ? 'text-success' : 'text-danger')}">
                                <option th:selected="${v.status == 'REGISTERED'}" value="REGISTERED" th:text="#{status.registered}">Registered</option>
                                <option th:selected="${v.status == 'PAID'}" value="PAID" th:text="#{status.paid}">Paid</option>
                                <option th:selected="${v.status == 'CANCELED'}" value="CANCELED" th:text="#{status.canceled}">Canceled</option>
                            </select>
                            <input type="text" name="reason" class="form-control form-control-sm mr-2" th:placeholder="#{manager.reason}" th:value="${v.cancellationReason}">
                            <button type="submit" class="btn btn-sm btn-primary" th:text="#{manager.save}">Save</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${orderedVouchers.empty}">
                    <td colspan="4" class="text-center text-muted" th:text="#{manager.orders.empty}">No ordered tours found.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ВКЛАДКА 2: ГАРЯЧІ ТУРИ (Тільки перемикач) -->
        <div class="tab-pane fade" id="tours" role="tabpanel">
            <table class="table table-hover mt-3">
                <thead class="thead-light">
                <tr><th th:text="#{tour.title}">Title</th><th th:text="#{tour.price}">Price</th><th th:text="#{tour.status}">Status</th><th th:text="#{manager.hot.toggle}">Is Hot?</th></tr>
                </thead>
                <tbody>
                <tr th:each="v : ${allVouchers}">
                    <td th:text="${v.title}"></td>
                    <td>$<span th:text="${v.price}"></span></td>
                    <td><span class="badge badge-info" th:text="${v.status}"></span></td>
                    <td>
                        <span class="badge mr-2" th:classappend="${(v.isHot ?: false) ? 'badge-danger' : 'badge-secondary'}" th:text="${(v.isHot ?: false) ? 'HOT' : 'Normal'}"></span>
                        <form th:action="@{'/web/vouchers/' + ${v.id} + '/hot'}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-warning" th:text="#{manager.toggle}">Toggle</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
<script>
    $(document).ready(function() {
        let hash = window.location.hash;
        if (hash) {
            $('.nav-tabs a[href="' + hash + '"]').tab('show');
        }
    });
</script>
</body>
</html>
