<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.profile}">My Profile</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a sec:authorize="hasRole('USER')" class="navbar-brand" href="/" th:text="#{nav.home}">Travel Agency</a>
    <a sec:authorize="hasRole('ADMIN')" class="navbar-brand" href="/admin" th:text="#{nav.home}">Travel Agency</a>
    <a sec:authorize="hasRole('MANAGER')" class="navbar-brand" href="/manager" th:text="#{nav.home}">Travel Agency</a>
    <div class="ml-auto">
        <a sec:authorize="isAnonymous()" href="/auth/sign-in" class="btn btn-outline-light" th:text="#{nav.signin}">Sign in</a>
        <a sec:authorize="isAnonymous()" href="/auth/sign-up" class="btn btn-primary" th:text="#{nav.signup}">Sign up</a>

        <a sec:authorize="isAuthenticated()" href="/profile" class="btn btn-success" th:text="#{nav.profile}">My Profile</a>
        <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn btn-warning" th:text="#{nav.admin}">Admin Panel</a>
        <a sec:authorize="hasRole('MANAGER')" href="/manager" class="btn btn-info" th:text="#{nav.manager}">Manager Panel</a>
        <a sec:authorize="isAuthenticated()" href="/auth/logout" class="btn btn-danger" th:text="#{nav.logout}">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-3 text-right">
        <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        <a href="?lang=uk" class="btn btn-sm btn-outline-secondary">UK</a>
    </div>

    <h2><span th:text="#{profile.title}">Personal Account:</span> <span class="text-primary" th:text="${user.firstName} + ' ' + ${user.lastName}"></span></h2>

    <div class="card p-3 mb-4 mt-3 shadow-sm">
        <p><strong th:text="#{profile.email}">Email:</strong> <span th:text="${user.email}"></span></p>
        <p><strong th:text="#{profile.balance}">Balance:</strong> $<span th:text="${user.balance}"></span></p>

        <form action="/web/profile/top-up" method="post" class="form-inline mt-2">
            <input type="number" step="0.01" name="amount" class="form-control mr-2" th:placeholder="#{profile.topup.amount}" required>
            <button type="submit" class="btn btn-sm btn-outline-success" th:text="#{profile.topup.btn}">Top Up Balance</button>
        </form>
    </div>
    <div sec:authorize="hasRole('USER')">
        <h4 th:text="#{profile.tours.title}">My Ordered Tours</h4>
        <table class="table table-bordered table-hover bg-white mt-3">
            <thead class="thead-light">
            <tr>
                <th>ID</th>
                <th th:text="#{tour.title}">Title</th>
                <th th:text="#{tour.price}">Price</th>
                <th th:text="#{tour.status}">Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${myVouchers}">
                <td th:text="${v.id}"></td>

                <td th:text="#{${v.title}}"></td>

                <td>$<span th:text="${v.price}"></span></td>
                <td>
                    <span class="badge" th:classappend="${v.status == 'REGISTERED' ? 'badge-info' : (v.status == 'PAID' ? 'badge-success' : 'badge-danger')}"
                          th:text="#{ 'status.' + ${#strings.toLowerCase(v.status)} }"></span>

                    <span th:if="${v.status == 'CANCELED' and v.cancellationReason != null}"
                          class="d-block mt-1 small text-danger"
                          th:text="#{profile.reason} + ': ' + ${v.cancellationReason}">
                    </span>
                </td>
            </tr>
            <tr th:if="${myVouchers == null or myVouchers.empty}">
                <td colspan="4" class="text-center text-muted" th:text="#{profile.tours.empty}">You haven't ordered any tours yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
