spring.main.allow-bean-definition-overriding=true
server.port=8080

# DataSource settings
spring.datasource.url=jdbc:h2:mem:travel_agency;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.security.enabled=true

application.security.jwt.secret-key = ${JWT_SECRET}
application.security.jwt.expiration = 86400000
application.security.jwt.refresh-token.expiration = 172800000

spring.thymeleaf.cache=false

logging.level.root=INFO
logging.level.com.epam.finaltask=INFO
logging.level.com.epam.finaltask.token=DEBUG
logging.level.org.springframework.security=DEBUG

spring.output.ansi.enabled=ALWAYS

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

org.springframework.security=DEBUG



